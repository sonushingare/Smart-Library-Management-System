<!DOCTYPE html>
<html>
<head>
    <head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Library Management System</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:url("https://images.unsplash.com/photo-1521587760476-6c12a4b040da?auto=format&fit=crop&w=1600&q=80");

background-size:cover;

background-position:center;

height:100vh;

overflow:hidden;

}

.overlay{

width:100%;

height:100%;

background:rgba(0,0,0,.60);

display:flex;

justify-content:center;

align-items:center;

}

.card{

width:550px;

background:rgba(255,255,255,.92);

backdrop-filter:blur(15px);

padding:35px;

border-radius:20px;

box-shadow:0 0 25px rgba(0,0,0,.4);

animation:fade 1s;

}

@keyframes fade{

from{

opacity:0;

transform:translateY(30px);

}

to{

opacity:1;

transform:translateY(0);

}

}

.logo{

width:90px;

display:block;

margin:auto;

}

h1{

text-align:center;

color:#0d47a1;

margin-top:15px;

}

h3{

text-align:center;

color:#555;

font-size:16px;

margin-bottom:25px;

}

input{

width:100%;

padding:14px;

font-size:17px;

border-radius:8px;

border:2px solid #1565c0;

outline:none;

}

button{

margin-top:18px;

width:100%;

padding:14px;

background:#1565c0;

color:white;

border:none;

border-radius:8px;

font-size:18px;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#0d47a1;

transform:scale(1.03);

}

#result{

margin-top:25px;

padding:18px;

background:#f8f8f8;

border-radius:10px;

font-size:17px;

line-height:30px;

display:none;

}

.status{

padding:5px 10px;

border-radius:20px;

color:white;

font-weight:bold;

}

.available{

background:green;

}

.notavailable{

background:red;

}

.footer{

margin-top:25px;

text-align:center;

color:#666;

font-size:14px;

}

</style>

</head>
</head>
<body>

<<body>

<div class="overlay">

<div class="card">

<img src="logo.png" class="logo" alt="College Logo">

<h1>📚 Smart Library Management System</h1>

<h3>S. B. Jain Institute of Technology,<br>Management & Research</h3>

<p id="datetime" style="text-align:center;color:#444;margin-bottom:20px;"></p>

<input
type="text"
id="book"
placeholder="🔍 Enter Book Name">

<button onclick="searchBook()">
🔎 Search Book
</button>

<div id="result"></div>

<div class="footer">
<hr style="margin:20px 0;">
<b>Developed by Sonu Shingare</b>
</div>

</div>

</div>

<script>

function updateTime(){

const now=new Date();

document.getElementById("datetime").innerHTML=

"📅 "+now.toLocaleDateString()+" &nbsp;&nbsp; ⏰ "+now.toLocaleTimeString();

}

setInterval(updateTime,1000);

updateTime();
document.getElementById("book").addEventListener("keypress",function(event){

if(event.key==="Enter"){

searchBook();

}

});

async function searchBook(){

const book=document.getElementById("book").value.trim();

const result=document.getElementById("result");

if(book===""){

result.style.display="block";

result.innerHTML="<h3>⚠ Please enter a book name.</h3>";

return;

}

result.style.display="block";

result.innerHTML="<h3>⏳ Searching book...</h3>";

try{

const response=await fetch("https://sonushingare.app.n8n.cloud/webhook/search-book?book="+encodeURIComponent(book));

const data=await response.json();

if(data.message){

result.innerHTML=`
<h2 style="color:red;text-align:center;">❌ Book Not Found</h2>
<p style="text-align:center;">Please check the spelling and try again.</p>
`;

}
else{

let status=
Number(data.Available_Copies)>0
?
'<span class="status available">🟢 Available</span>'
:
'<span class="status notavailable">🔴 Not Available</span>';

result.innerHTML=`

<h2 style="color:#1565c0;text-align:center;">
📖 ${data.Book_Name}
</h2>

<hr>

<p><b>👤 Author :</b> ${data.Author}</p>

<p><b>📚 Available Copies :</b> ${data.Available_Copies}</p>

<p><b>📍 Shelf :</b> ${data.Shelf}</p>

<p><b>Status :</b> ${status}</p>

`;

}

}catch(error){

result.innerHTML=`

<h2 style="color:red;">❌ Server Error</h2>

<p>Unable to connect with n8n Workflow.</p>

`;

}

}
</script>
</body>
</html>
