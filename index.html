<!DOCTYPE html>
<html>
<head>
    <title>Library Book Search</title>
</head>
<body>

<h2>Library Book Search</h2>

<input type="text" id="book" placeholder="Enter Book Name">
<button onclick="searchBook()">Search</button>

<pre id="result"></pre>

<script>
async function searchBook() {

    const book = document.getElementById("book").value;

const response = await fetch("https://sonushingare.app.n8n.cloud/webhook/search-book?book=" + encodeURIComponent(book));
    const data = await response.json();

    document.getElementById("result").textContent =
    "Book Name: " + data.Book_Name +
    "\nAuthor: " + data.Author +
    "\nAvailable Copies: " + data.Available_Copies +
    "\nShelf: " + data.Shelf;
}
</script>

</body>
</html>
